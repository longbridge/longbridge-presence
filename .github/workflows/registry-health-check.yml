name: Registry Health Check

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run registry health check
        id: registry
        run: python scripts/check_registries.py
        continue-on-error: true

      - name: Run sponsor check
        id: sponsor
        run: python scripts/check_sponsors.py
        continue-on-error: true

      - name: Generate homepage
        run: python scripts/generate_homepage.py

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: health-check-${{ github.run_id }}
          path: |
            tests/reports/
            docs/index.html
          retention-days: 30

      - name: Open issue on failures
        if: steps.registry.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const today = new Date().toISOString().slice(0,10);
            const report = fs.existsSync(`tests/reports/registry-${today}.md`)
              ? fs.readFileSync(`tests/reports/registry-${today}.md`, 'utf8').slice(0, 4000)
              : 'Report not generated.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Registry health check: failures detected (${today})`,
              body: `## Summary\n\nSome registry URLs returned ❌ or ⚠️. See details below.\n\n<details><summary>Report</summary>\n\n\`\`\`\n${report}\n\`\`\`\n\n</details>\n\nDownload full report from the [workflow artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['monitoring', 'registry'],
            });
